name: Android APK

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Upload installable debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kheyr-debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Write install instructions to job summary
        run: |
          echo "## Installable APK" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the artifact named `kheyr-debug-apk-${{ github.sha }}`, unzip it, and install `app-debug.apk` on your Android phone." >> "$GITHUB_STEP_SUMMARY"
